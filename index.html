<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Симулятор Охранника: Интерактивная Смена</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            touch-action: none;
        }
        #ui-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #222;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            z-index: 200;
            border-radius: 5px;
            text-transform: uppercase;
            cursor: pointer;
            pointer-events: auto;
        }
        #ui-panel {
            position: absolute;
            top: 60px;
            right: 10px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #0f0;
            padding: 15px;
            color: #0f0;
            border-radius: 5px;
            z-index: 100;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            max-width: 250px;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
            pointer-events: auto; 
        }
        h3 { margin-top: 0; font-size: 14px; text-transform: uppercase; border-bottom: 1px dashed #0f0; padding-bottom: 5px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; margin-bottom: 5px; }
        input[type="file"] { font-size: 11px; width: 100%; color: #fff; background: #333; padding: 5px; border-radius: 3px;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-toggle">НАСТРОЙКИ ⚙️</div>
    <div id="ui-panel">
        <h3>Загрузка видео</h3>
        <div class="control-group"><label>Камера 1 (Лев):</label><input type="file" id="vid1" accept="video/mp4,video/webm"></div>
        <div class="control-group"><label>Камера 2 (Цен):</label><input type="file" id="vid2" accept="video/mp4,video/webm"></div>
        <div class="control-group"><label>Камера 3 (Прав):</label><input type="file" id="vid3" accept="video/mp4,video/webm"></div>
        <hr style="border-color: #333;">
        <h3>Звуки Системы</h3>
        <div class="control-group"><label>Тревога (mp3):</label><input type="file" id="snd-alarm" accept="audio/*"></div>
        <div class="control-group"><label>Тушение (mp3):</label><input type="file" id="snd-ext" accept="audio/*"></div>
        <div class="control-group"><label>Звонок (mp3):</label><input type="file" id="snd-bell" accept="audio/*"></div>
        <div class="control-group"><label>Питье из кружки:</label><input type="file" id="snd-drink" accept="audio/*"></div>
    </div>

    <script>
        // === ЛОКАЛЬНАЯ БАЗА ДАННЫХ ===
        let db;
        const dbReq = indexedDB.open('GuardSimDB', 2);
        
        dbReq.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('mediaFiles')) {
                db.createObjectStore('mediaFiles');
            }
        };

        function loadMediaFromDB(key, callback) {
            if (!db) return;
            const tx = db.transaction('mediaFiles', 'readonly');
            const req = tx.objectStore('mediaFiles').get(key);
            req.onsuccess = () => {
                if (req.result) callback(URL.createObjectURL(req.result));
            };
        }

        function saveMediaToDB(key, file) {
            if (!db) return;
            const tx = db.transaction('mediaFiles', 'readwrite');
            tx.objectStore('mediaFiles').put(file, key);
        }

        // === АУДИО ДВИЖОК ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSynthSound(type, freq = 400) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'mech_click') {
                osc.type = 'square'; osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'key') {
                osc.type = 'square'; osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.04);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                osc.start(now); osc.stop(now + 0.04);
            } else if (type === 'mouse') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.03);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                osc.start(now); osc.stop(now + 0.03);
            } else if (type === 'beep') {
                osc.type = 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            }
        }

        // === ИНТЕРФЕЙС ===
        const uiToggle = document.getElementById('ui-toggle');
        const uiPanel = document.getElementById('ui-panel');
        let heldItem = null; 

        uiToggle.addEventListener('pointerdown', (e) => { 
            e.stopPropagation(); 
            uiPanel.style.display = uiPanel.style.display === 'block' ? 'none' : 'block'; 
        });

        uiPanel.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
        });

        // === ТЕКСТУРЫ ===
        function createWoodTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#4a2e1b'; ctx.fillRect(0, 0, 512, 512);
            for(let i=0; i<300; i++) {
                ctx.fillStyle = `rgba(20, 10, 5, ${Math.random() * 0.4})`;
                ctx.fillRect(0, Math.random() * 512, 512, Math.random() * 5 + 1);
            }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
        }

        function createWallTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#222222'; ctx.fillRect(0, 0, 512, 512);
            for(let i=0; i<5000; i++) {
                ctx.fillStyle = `rgba(0, 0, 0, ${Math.random() * 0.2})`;
                ctx.fillRect(Math.random()*512, Math.random()*512, Math.random()*10, Math.random()*10);
            }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
        }

        function createTVNoiseTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d'); const imgData = ctx.createImageData(256, 256);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const val = Math.random() * 255;
                imgData.data[i] = val; imgData.data[i+1] = val; imgData.data[i+2] = val; imgData.data[i+3] = 255;
            }
            ctx.putImageData(imgData, 0, 0); const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
        }

        const woodTex = createWoodTexture();
        const wallTex = createWallTexture();
        const noiseTex = createTVNoiseTexture();

        // === СЦЕНА И АТМОСФЕРА ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.03);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4.2, 3.0); scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const interactables = []; 
        const animatables = []; 
        const buttonsToUpdate = []; 

        // === ОСВЕЩЕНИЕ ===
        const ambientLight = new THREE.AmbientLight(0x555566, 1.2); scene.add(ambientLight);
        const screenLight = new THREE.PointLight(0x88ccff, 0.6, 10); screenLight.position.set(0, 4.5, -1); scene.add(screenLight);
        const alarmLight = new THREE.PointLight(0xff0000, 0, 15); alarmLight.position.set(0, 6, 1); scene.add(alarmLight);

        // === КОМНАТА И СТОЛ ===
        const roomMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 1, side: THREE.BackSide });
        const room = new THREE.Mesh(new THREE.BoxGeometry(16, 10, 16), roomMat);
        room.position.y = 5; room.receiveShadow = true; scene.add(room); 

        const deskMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.7 });
        const desk = new THREE.Mesh(new THREE.BoxGeometry(10, 0.6, 6), deskMat);
        desk.position.set(0, 3, -0.5); desk.receiveShadow = true; desk.castShadow = true; scene.add(desk);

        // --- КЛАВИАТУРА И МЫШЬ ---
        const kbGroup = new THREE.Group();
        const kbBase = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.15, 1.1), new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 }));
        kbBase.castShadow = true; kbGroup.add(kbBase); 

        const keyGeo = new THREE.BoxGeometry(0.12, 0.1, 0.12);
        const keyMat = new THREE.MeshStandardMaterial({ color: 0x2b2b2b, roughness: 0.6 });
        
        for(let r = 0; r < 5; r++) {
            for(let c = 0; c < 15; c++) {
                if(r === 4 && c > 3 && c < 11) continue; 
                const key = new THREE.Mesh(keyGeo, keyMat);
                key.position.set(-1.3 + c * 0.13, 0.08, -0.35 + r * 0.15);
                key.userData = { type: 'key', origY: 0.08, tgtY: 0.03 };
                kbGroup.add(key); interactables.push(key);
            }
        }
        for(let r = 0; r < 5; r++) {
            for(let c = 0; c < 4; c++) {
                const key = new THREE.Mesh(keyGeo, keyMat);
                key.position.set(0.85 + c * 0.13, 0.08, -0.35 + r * 0.15);
                key.userData = { type: 'key', origY: 0.08, tgtY: 0.03 };
                kbGroup.add(key); interactables.push(key);
            }
        }
        const spacebar = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.12), keyMat);
        spacebar.position.set(-1.3 + 7 * 0.13, 0.08, -0.35 + 4 * 0.15);
        spacebar.userData = { type: 'key', origY: 0.08, tgtY: 0.03 };
        kbGroup.add(spacebar); interactables.push(spacebar);
        kbGroup.position.set(-0.5, 3.35, 0.8); kbGroup.rotation.x = 0.08; scene.add(kbGroup);

        const padGroup = new THREE.Group();
        const padMain = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.02, 1.2), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 1.0 }));
        const padBorder = new THREE.Mesh(new THREE.BoxGeometry(1.44, 0.025, 1.24), new THREE.MeshStandardMaterial({ color: 0xaa0000, roughness: 0.8 }));
        padGroup.add(padBorder, padMain); padGroup.position.set(2.0, 3.31, 0.8); padGroup.receiveShadow = true; scene.add(padGroup);

        const mouseGroup = new THREE.Group();
        const mBase = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.12, 0.48), new THREE.MeshPhysicalMaterial({ color: 0x111111, roughness: 0.5, clearcoat: 0.2 }));
        mBase.position.y = 0.06; mBase.castShadow = true;
        
        const btnGeo = new THREE.BoxGeometry(0.13, 0.04, 0.22);
        const mBtnMat = new THREE.MeshPhysicalMaterial({ color: 0x222222, roughness: 0.4, clearcoat: 0.1 });
        const mBtnL = new THREE.Mesh(btnGeo, mBtnMat); mBtnL.position.set(-0.07, 0.12, -0.13); mBtnL.userData = { type: 'mouse', origY: 0.12, tgtY: 0.10 };
        const mBtnR = new THREE.Mesh(btnGeo, mBtnMat); mBtnR.position.set(0.07, 0.12, -0.13); mBtnR.userData = { type: 'mouse', origY: 0.12, tgtY: 0.10 };
        const mWheel = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.04, 16), new THREE.MeshStandardMaterial({ color: 0x050505 }));
        mWheel.rotation.z = Math.PI / 2; mWheel.position.set(0, 0.13, -0.16); mWheel.userData = { type: 'mouse', origY: 0.13, tgtY: 0.11 };
        
        const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.8, 8), new THREE.MeshStandardMaterial({color: 0x111}));
        wire.rotation.x = Math.PI/2; wire.position.set(0, 0.02, -0.6);

        mouseGroup.add(mBase, mBtnL, mBtnR, mWheel, wire);
        mouseGroup.position.set(2.0, 3.33, 0.8); mouseGroup.rotation.y = -0.15;
        scene.add(mouseGroup); interactables.push(mBtnL, mBtnR, mWheel);

        // --- КРАСИВАЯ КРУЖКА С ЧАЕМ ---
        const mugGroup = new THREE.Group();
        mugGroup.userData = { type: 'mug', deskPos: new THREE.Vector3(-2.6, 3.32, 0.3), deskRot: new THREE.Euler(0, 0, 0) };
        
        const mugMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.05, metalness: 0.1, clearcoat: 1.0, clearcoatRoughness: 0.1 });
        const mugBody = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.3, 32), mugMat);
        mugBody.position.y = 0.15; mugBody.castShadow = true; mugBody.receiveShadow = true;
        
        const handleMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.05, clearcoat: 1.0 });
        const handleRingGeo = new THREE.TorusGeometry(0.07, 0.02, 16, 32, Math.PI); 
        const mugHandle = new THREE.Mesh(handleRingGeo, handleMat);
        mugHandle.position.set(0.12, 0.15, 0); 
        mugHandle.rotation.z = -Math.PI / 2; 

        const teaMat = new THREE.MeshStandardMaterial({ color: 0x3d1c00, roughness: 0.2 });
        const teaSurface = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.28, 32), teaMat);
        teaSurface.position.y = 0.15;
        
        mugGroup.add(mugBody, mugHandle, teaSurface);
        
        const mugHitbox = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.4, 0.35), new THREE.MeshBasicMaterial({visible: false}));
        mugHitbox.position.set(0, 0.15, 0);
        mugHitbox.userData = { type: 'mug_body' };
        mugGroup.add(mugHitbox); interactables.push(mugHitbox); 

        mugGroup.scale.set(1.3, 1.3, 1.3);
        mugGroup.position.copy(mugGroup.userData.deskPos);
        scene.add(mugGroup);

        // --- ИНТЕРАКТИВНАЯ РАЦИЯ ---
        const wtGroup = new THREE.Group();
        wtGroup.userData = { type: 'walkie', deskPos: new THREE.Vector3(-3.8, 3.32, 0.6), deskRot: new THREE.Euler(-0.05, 0.6, 0) };
        
        const wtMat = new THREE.MeshPhysicalMaterial({ color: 0x111111, roughness: 0.6, clearcoat: 0.4 });
        const wtBody = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.9, 0.2), wtMat);
        wtBody.position.y = 0.45; wtBody.castShadow = true; wtBody.userData = { type: 'walkie_body' }; 
        interactables.push(wtBody); 

        const wtAntenna = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4), new THREE.MeshStandardMaterial({ color: 0x111 }));
        wtAntenna.position.set(-0.1, 1.0, 0);

        const wtCanvas = document.createElement('canvas'); wtCanvas.width = 128; wtCanvas.height = 64;
        const wtCtx = wtCanvas.getContext('2d'); wtCtx.fillStyle = '#2b3a2b'; wtCtx.fillRect(0,0,128,64);
        const wtTex = new THREE.CanvasTexture(wtCanvas);
        const wtScreen = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.2), new THREE.MeshBasicMaterial({ map: wtTex }));
        wtScreen.position.set(0, 0.7, 0.101);
        
        let wtScreenText = "";
        function updateWTScreen(text) {
            wtCtx.fillStyle = '#2b3a2b'; wtCtx.fillRect(0,0,128,64);
            wtCtx.fillStyle = '#11ff11'; wtCtx.font = '24px monospace';
            wtCtx.fillText(text.slice(-8), 5, 40); wtTex.needsUpdate = true;
        }

        wtGroup.add(wtBody, wtAntenna, wtScreen);

        const wtPadLayout = ['1','2','3','4','5','6','7','8','9','*','0','#'];
        const wtFreqs = [697,770,852, 697,770,852, 697,770,852, 941,941,941]; 
        for(let i=0; i<12; i++) {
            const wBtn = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.06, 0.04), new THREE.MeshStandardMaterial({ color: 0x444 }));
            wBtn.position.set(-0.1 + (i%3)*0.1, 0.45 - Math.floor(i/3)*0.08, 0.1);
            wBtn.userData = { type: 'walkie_btn', char: wtPadLayout[i], freq: wtFreqs[i], isPressed: false, origZ: 0.1, tgtZ: 0.08 };
            wtGroup.add(wBtn); interactables.push(wBtn); buttonsToUpdate.push(wBtn);
        }

        wtGroup.position.copy(wtGroup.userData.deskPos); wtGroup.rotation.copy(wtGroup.userData.deskRot);
        scene.add(wtGroup);

        // === МОНИТОРЫ ===
        function createCRTMonitor(x, y, z, rotY) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(3.6, 2.8, 2.5), new THREE.MeshStandardMaterial({color: 0x151515, roughness: 0.8}));
            body.castShadow = true; group.add(body); 
            const bezel = new THREE.Mesh(new THREE.BoxGeometry(3.4, 2.6, 2.6), new THREE.MeshStandardMaterial({color: 0x0a0a0a, roughness: 0.9}));
            group.add(bezel);
            const screenGeo = new THREE.PlaneGeometry(3.2, 2.4, 16, 16);
            const pos = screenGeo.attributes.position;
            for(let i=0; i<pos.count; i++) { pos.setZ(i, Math.cos(pos.getX(i)*0.4)*Math.cos(pos.getY(i)*0.4)*0.2); }
            screenGeo.computeVertexNormals();
            const screen = new THREE.Mesh(screenGeo, new THREE.MeshBasicMaterial({ map: noiseTex, color: 0xaaaaaa }));
            screen.position.z = 1.31;
            group.add(screen); group.position.set(x, y, z); group.rotation.y = rotY; scene.add(group); return screen;
        }

        const screenLeft = createCRTMonitor(-4.2, 4.8, -2.2, Math.PI / 6);
        const screenCenter = createCRTMonitor(0, 4.8, -2.5, 0);
        const screenRight = createCRTMonitor(4.2, 4.8, -2.2, -Math.PI / 6);

        function setupVideo(inputId, targetScreen, dbKey) {
            const video = document.createElement('video'); video.loop = video.muted = video.playsInline = true;
            
            dbReq.addEventListener('success', () => {
                loadMediaFromDB(dbKey, (url) => {
                    video.src = url; video.play();
                    targetScreen.material = new THREE.MeshBasicMaterial({ map: new THREE.VideoTexture(video) });
                });
            });

            document.getElementById(inputId).addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file) { 
                    saveMediaToDB(dbKey, file);
                    video.src = URL.createObjectURL(file); video.play(); 
                    targetScreen.material = new THREE.MeshBasicMaterial({ map: new THREE.VideoTexture(video) }); 
                }
            });
        }
        setupVideo('vid1', screenLeft, 'vid1'); setupVideo('vid2', screenCenter, 'vid2'); setupVideo('vid3', screenRight, 'vid3');

        // === ПЛАВНЫЕ КНОПКИ СИСТЕМЫ ===
        function createArcadeButton(x, z, colorHex, label) {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 0.3, 32), new THREE.MeshStandardMaterial({color: 0x222222}));
            base.position.y = 0.15; base.castShadow = true; group.add(base); 
            
            const btnMat = new THREE.MeshPhysicalMaterial({ color: colorHex, roughness: 0.1, clearcoat: 1.0, emissive: colorHex, emissiveIntensity: 0.4 });
            const btnMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.25, 32), btnMat);
            btnMesh.position.y = 0.4; btnMesh.castShadow = true;
            btnMesh.userData = { type: 'arcade', action: label, audioObj: new Audio(), isPressed: false, origY: 0.4, tgtY: 0.25 };
            
            group.add(btnMesh); interactables.push(btnMesh); buttonsToUpdate.push(btnMesh);
            group.position.set(x, 3.3, z); scene.add(group); return btnMesh;
        }

        const btnAlarm = createArcadeButton(-2.5, -0.8, 0xff0000, 'alarm'); 
        const btnExtinguish = createArcadeButton(0, -0.8, 0x0088ff, 'extinguisher'); 
        const btnBell = createArcadeButton(2.5, -0.8, 0xffcc00, 'bell'); 

        function setupCustomAudio(id, audioObj, dbKey, loop = true) {
            audioObj.loop = loop;
            dbReq.addEventListener('success', () => {
                loadMediaFromDB(dbKey, (url) => { audioObj.src = url; });
            });
            document.getElementById(id).addEventListener('change', e => {
                const file = e.target.files[0];
                if(file) { saveMediaToDB(dbKey, file); audioObj.src = URL.createObjectURL(file); }
            });
        }

        setupCustomAudio('snd-alarm', btnAlarm.userData.audioObj, 'alarm'); 
        setupCustomAudio('snd-ext', btnExtinguish.userData.audioObj, 'ext'); 
        setupCustomAudio('snd-bell', btnBell.userData.audioObj, 'bell');

        const sndDrink = new Audio();
        setupCustomAudio('snd-drink', sndDrink, 'drink', false);

        // --- СИСТЕМА ТУШЕНИЯ ---
        let isExtinguishing = false, isBellActive = false;
        const waterGeo = new THREE.BufferGeometry(); const waterPos = new Float32Array(6000);
        for(let i=0; i<6000; i++) waterPos[i] = (Math.random() - 0.5) * 12; 
        waterGeo.setAttribute('position', new THREE.BufferAttribute(waterPos, 3));
        const waterSystem = new THREE.Points(waterGeo, new THREE.PointsMaterial({color: 0xaaccff, size: 0.08, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending}));
        waterSystem.visible = false; scene.add(waterSystem);

        // === УПРАВЛЕНИЕ И ВЗАИМОДЕЙСТВИЕ ===
        const raycaster = new THREE.Raycaster();
        let isAlarmActive = false, targetRotX = 0, targetRotY = 0, currentRotX = 0, currentRotY = 0;
        let isDragging = false, prevTouch = { x: 0, y: 0 };
        let actionInterval = null; 
        let targetMugRot = 0, currentMugRot = 0; 

        function attachToCamera(item, type) {
            scene.remove(item); camera.add(item); heldItem = type;
            if(type === 'walkie') {
                // ИСПРАВЛЕНИЕ: позиция ниже, поворот 0 (чтобы смотреть на кнопки), масштаб 0.6 (~1/5 экрана)
                item.position.set(0, -0.3, -1.0); 
                item.rotation.set(0, 0, 0); 
                item.scale.set(0.6, 0.6, 0.6);
            } else if(type === 'mug') {
                item.position.set(0, -0.4, -0.6); 
                item.rotation.set(0, 0, 0); 
            }
        }

        function dropItem() {
            if (!heldItem) return;
            const item = heldItem === 'walkie' ? wtGroup : mugGroup;
            camera.remove(item); scene.add(item);
            item.position.copy(item.userData.deskPos); item.rotation.copy(item.userData.deskRot);
            
            if(heldItem === 'walkie') { 
                wtScreenText = ""; updateWTScreen(""); 
                item.scale.set(1, 1, 1); 
            }
            if(heldItem === 'mug') { 
                targetMugRot = 0; currentMugRot = 0; item.rotation.x = 0; 
            }
            
            heldItem = null;
        }

        function toggleActionAudio(btnData, state) {
            if (btnData.audioObj && btnData.audioObj.src) {
                if (state) btnData.audioObj.play(); else { btnData.audioObj.pause(); btnData.audioObj.currentTime = 0; }
            }
        }

        function handlePointerDown(e) {
            if(e.target.closest('#ui-toggle') || e.target.closest('#ui-panel')) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            isDragging = true; prevTouch = { x: clientX, y: clientY };
            const touch = new THREE.Vector2((clientX / window.innerWidth) * 2 - 1, -(clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(touch, camera);

            if (heldItem) {
                const itemGroup = heldItem === 'walkie' ? wtGroup : mugGroup;
                const intersectsHeld = raycaster.intersectObjects(itemGroup.children, true);
                
                if (intersectsHeld.length > 0) {
                    if (heldItem === 'walkie' && intersectsHeld[0].object.userData.type === 'walkie_btn') {
                        const data = intersectsHeld[0].object.userData;
                        data.isPressed = true; playSynthSound('beep', data.freq);
                        wtScreenText += data.char; updateWTScreen(wtScreenText);
                    } else if (heldItem === 'mug') {
                        targetMugRot = Math.PI / 4; 
                        if (sndDrink.src) {
                            sndDrink.currentTime = 0;
                            sndDrink.play().catch(err => console.log("Audio play error:", err));
                        }
                    }
                } else { dropItem(); }
                return; 
            }

            const intersects = raycaster.intersectObjects(interactables);
            if (intersects.length > 0) {
                const obj = intersects[0].object;
                const data = obj.userData;

                if (data.type === 'key' || data.type === 'mouse' || data.type === 'arcade') {
                    if(data.type === 'arcade') {
                        data.isPressed = true; playSynthSound('mech_click', 600);
                        if(data.action === 'alarm') { isAlarmActive = !isAlarmActive; toggleActionAudio(data, isAlarmActive); }
                        if(data.action === 'extinguisher') { isExtinguishing = !isExtinguishing; waterSystem.visible = isExtinguishing; toggleActionAudio(data, isExtinguishing); }
                        if(data.action === 'bell') { isBellActive = !isBellActive; toggleActionAudio(data, isBellActive); }
                    } else {
                        obj.position.y = data.tgtY;
                        if(data.type === 'key') playSynthSound('key');
                        if(data.type === 'mouse') playSynthSound('mouse');
                        if(!animatables.includes(obj)) animatables.push(obj);
                    }
                }

                if (data.type === 'walkie_body') attachToCamera(wtGroup, 'walkie');
                if (data.type === 'mug_body') attachToCamera(mugGroup, 'mug');
            }
        }

        function handlePointerUp() {
            isDragging = false;
            clearInterval(actionInterval);
            targetMugRot = 0; 
            buttonsToUpdate.forEach(b => b.userData.isPressed = false);

            // ИСПРАВЛЕНИЕ: Обрываем звук питья, когда отпускаем (анимация прекращается)
            if (sndDrink && !sndDrink.paused) {
                sndDrink.pause();
                sndDrink.currentTime = 0;
            }
        }

        function handlePointerMove(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaX = clientX - prevTouch.x, deltaY = clientY - prevTouch.y;
            targetRotY += deltaX * 0.003; targetRotX += deltaY * 0.003;
            targetRotX = Math.max(-Math.PI/5, Math.min(Math.PI/6, targetRotX));
            targetRotY = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, targetRotY));
            prevTouch = { x: clientX, y: clientY };
        }

        window.addEventListener('pointerdown', handlePointerDown);
        window.addEventListener('pointerup', handlePointerUp);
        window.addEventListener('pointermove', handlePointerMove);

        // === АНИМАЦИИ ===
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            noiseTex.offset.y = (time * 5) % 1; noiseTex.offset.x = (time * 2) % 1;

            currentRotX += (targetRotX - currentRotX) * 0.15;
            currentRotY += (targetRotY - currentRotY) * 0.15;
            camera.rotation.set(currentRotX, currentRotY, 0, 'YXZ');

            for(let i = animatables.length - 1; i >= 0; i--) {
                const obj = animatables[i];
                obj.position.y += (obj.userData.origY - obj.position.y) * 0.15;
                if(Math.abs(obj.position.y - obj.userData.origY) < 0.001) animatables.splice(i, 1);
            }

            buttonsToUpdate.forEach(b => {
                const data = b.userData;
                const target = data.isPressed ? data.tgtY || data.tgtZ : data.origY || data.origZ;
                const prop = data.type === 'walkie_btn' ? 'z' : 'y';
                b.position[prop] += (target - b.position[prop]) * 0.3;
                if(data.type === 'walkie_btn' && data.isPressed) data.isPressed = false; 
            });

            if (heldItem === 'mug') {
                currentMugRot += (targetMugRot - currentMugRot) * 0.1;
                mugGroup.rotation.x = currentMugRot;
            }

            if (isAlarmActive) {
                alarmLight.intensity = (Math.sin(time * 10) > 0) ? 5 : 0; 
                scene.fog.color.setHex((Math.sin(time * 10) > 0) ? 0x330000 : 0x1a1a1a); 
            } else { scene.fog.color.setHex(0x1a1a1a); alarmLight.intensity = 0; }

            if (isExtinguishing) {
                const pos = waterSystem.geometry.attributes.position.array;
                for(let i=0; i<2000; i++) {
                    pos[i*3+1] -= 0.2; if(pos[i*3+1] < 1) pos[i*3+1] = 9 + Math.random() * 2;
                }
                waterSystem.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
